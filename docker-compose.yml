services:
  # VocabuRex Speech Service with GPU support
  speech-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vocabu-rex-speech-service
    runtime: nvidia  # Force NVIDIA runtime
    ports:
      - "3005:3005"
    environment:
      - ENVIRONMENT=production
      - APP_NAME=VocabuRex Speech Service
      - APP_VERSION=1.0.0
      - LOG_LEVEL=INFO
      - UPLOAD_DIR=/app/uploads
      - CUDA_VISIBLE_DEVICES=0
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    volumes:
      # Persist uploads and models
      - ./uploads:/app/uploads
      - ./models:/app/models
      - ./logs:/app/logs
      # Optional: Mount warmup files
      - ./warmup:/app/warmup:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3005/speech/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - vocabu-rex-network

  # PostgreSQL Database for Speech Service (optional)
  speech-db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: vocabu_user
      POSTGRES_PASSWORD: vocabu_password
      POSTGRES_DB: vocabu_speech_db
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    ports:
      - "5435:5432"
    volumes:
      - speech_db_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vocabu_user -d vocabu_speech_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vocabu-rex-network
    profiles:
      - database

volumes:
  speech_db_data:
    driver: local

networks:
  vocabu-rex-network:
    driver: bridge
    external: false